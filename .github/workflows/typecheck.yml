name: Type Check

on:
  pull_request:
    branches:
      - master
      - feat/*

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata
        run: node ../scripts/write-version.mjs
        working-directory: ui

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ui
