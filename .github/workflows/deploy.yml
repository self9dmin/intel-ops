name: Deploy to Dynatrace
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Bump version and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.config.json', 'utf8'));
            const parts = config.app.version.split('.').map(Number);
            parts[2]++;
            config.app.version = parts.join('.');
            fs.writeFileSync('app.config.json', JSON.stringify(config, null, 2));
            console.log('Version bumped to', config.app.version);
          "
          git add app.config.json
          git commit -m "chore: bump version [skip ci]"
          git push
      - name: Deploy to Dynatrace
        run: npx dt-app deploy
        env:
          DT_APP_OAUTH_CLIENT_ID: ${{ secrets.DT_APP_OAUTH_CLIENT_ID }}
          DT_APP_OAUTH_CLIENT_SECRET: ${{ secrets.DT_APP_OAUTH_CLIENT_SECRET }}
